name: Bitwarden Sync

on:
  push:
    branches:
      - main
    paths:
      - "docker/**"
      - ".github/workflows/bitwarden_sync_docker.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Log in to Docker Hub
        uses: docker/login-action@c144859092e8e353f3e118b0b329679a62351c3e
        with:
          username: "${{ secrets.DOCKER_USERNAME }}"
          password: "${{ secrets.DOCKER_PASSWORD }}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c144859092e8e353f3e118b0b329679a62351c3e
        with:
          registry: ghcr.io
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (multi-arch → Docker Hub + GHCR)
        env:
          DOCKER_USERNAME: "${{ secrets.DOCKER_USERNAME }}"
          GHCR_OWNER: "${{ github.repository_owner }}"
        run: |
          docker buildx build . \
            -f docker/Dockerfile \
            --platform linux/arm64,linux/amd64 \
            -t "${DOCKER_USERNAME}/bitwarden-sync:latest" \
            -t "ghcr.io/${GHCR_OWNER}/bitwarden-sync:latest" \
            --push

# Additional platforms (build time / support permitting):
# linux/386,linux/arm/v6,linux/arm/v7
