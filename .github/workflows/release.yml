name: Release

# Conventional commits on main drive this. release-please keeps a "release PR"
# open with the next semver + changelog; merging it creates the git tag and the
# GitHub Release, and (in the SAME run — so no GITHUB_TOKEN "downstream workflow"
# gotcha) builds and pushes the versioned, multi-arch images to Docker Hub + GHCR.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # create tags + GitHub Releases
  pull-requests: write # open/maintain the release PR
  packages: write # push to GHCR

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    env:
      # Add a RELEASE_PLEASE_TOKEN PAT (or GitHub App token) to get fully
      # automatic releases: the release PR is then created by that token, so its
      # CI checks actually run and it can auto-merge. Without it, this falls back
      # to GITHUB_TOKEN — release PRs still open automatically, but you click
      # "merge" yourself (GITHUB_TOKEN-created PRs don't trigger CI, so a required
      # check would otherwise never report and auto-merge could never complete).
      HAS_RP_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN != '' }}
    outputs:
      # Manifest mode prefixes per-package outputs with the path ("." here).
      release_created: ${{ steps.rp.outputs['.--release_created'] }}
      major: ${{ steps.rp.outputs['.--major'] }}
      minor: ${{ steps.rp.outputs['.--minor'] }}
      patch: ${{ steps.rp.outputs['.--patch'] }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Auto-merge the release PR
        if: ${{ steps.rp.outputs.pr && env.HAS_RP_TOKEN == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: gh pr merge --auto --squash "${{ fromJson(steps.rp.outputs.pr).number }}"

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        env:
          V: ${{ needs.release-please.outputs.major }}.${{ needs.release-please.outputs.minor }}.${{ needs.release-please.outputs.patch }}
          MAJOR: ${{ needs.release-please.outputs.major }}
          MINOR: ${{ needs.release-please.outputs.minor }}
        with:
          images: |
            martadams89/bitwarden-sync
            ghcr.io/${{ github.repository_owner }}/bitwarden-sync
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.V }}
            type=raw,value=${{ env.MAJOR }}.${{ env.MINOR }}
            type=raw,value=${{ env.MAJOR }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
