name: Docker

# Bleeding-edge + maintenance image builds (versioned releases are handled by
# release.yml). Pushes to main publish :edge. The weekly schedule rebuilds so
# base-image (Alpine/Node) security patches land even during long quiet periods
# with no dependency PRs — and on the schedule, if main's HEAD is exactly a
# release tag, it also refreshes :latest + that version with the fresh base.

on:
  push:
    branches: [main]
    paths:
      - "docker/**"
  schedule:
    - cron: "0 4 * * 1" # Mondays 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-edge
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # need tags for the release-tag check below

      - name: Compute image tags
        id: tags
        env:
          GHCR_OWNER: ${{ github.repository_owner }}
          EVENT: ${{ github.event_name }}
        run: |
          {
            echo "list<<EOF"
            echo "martadams89/bitwarden-sync:edge"
            echo "ghcr.io/${GHCR_OWNER}/bitwarden-sync:edge"
            # On the scheduled run, if HEAD is exactly a release tag, also refresh
            # :latest (and the exact version) so the released image gets patches.
            if [ "$EVENT" = "schedule" ] && rel=$(git describe --tags --exact-match 2>/dev/null); then
              ver=${rel#v}
              echo "martadams89/bitwarden-sync:latest"
              echo "martadams89/bitwarden-sync:${ver}"
              echo "ghcr.io/${GHCR_OWNER}/bitwarden-sync:latest"
              echo "ghcr.io/${GHCR_OWNER}/bitwarden-sync:${ver}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Docker Hub
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.list }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
