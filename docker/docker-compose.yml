services:
  bitwarden-sync:
    image: martadams89/bitwarden-sync:latest
    container_name: bitwarden-sync
    # To bake custom Bitwarden CLI versions into a locally built image, comment
    # out `image:` above and uncomment this block:
    # build:
    #   context: ..
    #   dockerfile: docker/Dockerfile
    #   args:
    #     BW_CLI_OLD_VERSION: 2025.12.0   # source / Vaultwarden compatibility
    #     BW_CLI_NEW_VERSION: latest      # destination / Bitwarden cloud
    restart: always
    environment:
      - CRON_SCHEDULE=0 0 * * *
      # Run one sync immediately on container start (handy for first-run/testing),
      # then continue on the cron schedule:
      # - RUN_ON_START=true
      #
      # Force a run any time without waiting for cron:
      #   docker compose exec bitwarden-sync /app/script.sh
      # A flock guard prevents it from overlapping a scheduled run. Each run
      # writes its outcome to <BITWARDENCLI_APPDATA_DIR>/last-run.json.
      # Optional: override the Bitwarden CLI version at RUNTIME (works on the
      # published image, no rebuild needed). The entrypoint reinstalls only when
      # a concrete version differs from the baked-in default (source 2025.12.0,
      # destination latest). Pin a known-good source version here if a future
      # CLI release breaks Vaultwarden again (issue #50):
      # - BW_CLI_OLD_VERSION=2025.12.0
      # - BW_CLI_NEW_VERSION=latest
      # Optional: if the source login fails with a transport error (e.g.
      # "Premature close"), these source CLI versions are tried in order
      # (installed version first, then these). Default shown:
      # - BW_CLI_OLD_FALLBACK_VERSIONS=2025.12.0 2024.9.0
      # Optional: source login retry tuning (defaults shown)
      # - BW_LOGIN_RETRIES=3
      # - BW_LOGIN_RETRY_DELAY=5
      # Optional override for CLI app data location (default shown)
      - BITWARDENCLI_APPDATA_DIR=/app/data/bitwarden-cli
      # The REST API device ID is persisted in the app data directory.
      # Optional fixed overrides:
      # - BW_DEVICE_IDENTIFIER=bitwarden-sync-production
      # - BW_DEVICE_NAME=bitwarden-sync

      # ── Password options (choose ONE method per secret) ──────────────────────
      #
      # Option A – Plaintext (simplest, least secure)
      - BW_TAR_PASS=CHANGEME
      - BW_PASS_SOURCE=CHANGEME
      - BW_PASS_DEST=CHANGEME
      #
      # Option B – Docker secrets / plain-text file
      #   Mount a file containing only the password and point to it.
      #   e.g.  echo 'mypassword' > /run/secrets/bw_pass_source
      # - BW_TAR_PASS_FILE=/run/secrets/bw_tar_pass
      # - BW_PASS_SOURCE_FILE=/run/secrets/bw_pass_source
      # - BW_PASS_DEST_FILE=/run/secrets/bw_pass_dest
      #
      # Option C – OpenSSL-encrypted files (same approach as the standalone script)
      #   Generate with:
      #     openssl rand -base64 32 > /secrets/bw_source.key
      #     echo 'mypassword' | openssl enc -aes-256-cbc -salt \
      #       -out /secrets/bw_source_pass.enc -pass file:/secrets/bw_source.key
      #   Then set these pairs of variables (and mount the files below):
      # - BW_TAR_PASS_ENC_FILE=/secrets/bw_tar_pass.enc
      # - BW_TAR_PASS_KEYFILE=/secrets/bw_tar.key
      # - BW_PASS_SOURCE_ENC_FILE=/secrets/bw_source_pass.enc
      # - BW_PASS_SOURCE_KEYFILE=/secrets/bw_source.key
      # - BW_PASS_DEST_ENC_FILE=/secrets/bw_dest_pass.enc
      # - BW_PASS_DEST_KEYFILE=/secrets/bw_dest.key
      # ─────────────────────────────────────────────────────────────────────────

      - BW_ACCOUNT_SOURCE=mybitwardensource@email.com
      - BW_CLIENTID_SOURCE=user.32323232-3232323-232323-3232323-32323232
      - BW_CLIENTSECRET_SOURCE=FdfdfdfdfdfdfFfdfdffdfdfd
      - BW_SERVER_SOURCE=https://vault.mydomain.com
      - BW_ACCOUNT_DEST=mybitwardendest@email.com
      - BW_CLIENTID_DEST=user.1221212-121212-12121-12121
      - BW_CLIENTSECRET_DEST=Dsfdfdfdfdfdfdfdfdfgfdfdfds
      - BW_SERVER_DEST=https://vault.bitwarden.com
      #
      # Both destination endpoints are used:
      #   Identity endpoint: logs in with the API key and obtains an access token.
      #   API endpoint: uses that token to sync and delete vault contents.
      #
      # Normally set only BW_SERVER_DEST; the script derives both endpoints:
      # Vaultwarden / self-hosted Bitwarden:
      #   BW_SERVER_DEST=https://vault.example.com
      #   API:      https://vault.example.com/api
      #   Identity: https://vault.example.com/identity
      # Bitwarden Cloud US:
      #   BW_SERVER_DEST=https://vault.bitwarden.com
      #   API:      https://api.bitwarden.com
      #   Identity: https://identity.bitwarden.com
      # Bitwarden Cloud EU uses the equivalent .eu hostnames.
      #
      # Do not set these overrides for a standard Vaultwarden, self-hosted
      # Bitwarden, or Bitwarden Cloud installation. They are only for
      # non-standard reverse proxies where the derived URLs above are wrong:
      # - BW_API_URL_DEST=https://vault.mydomain.com/api
      # - BW_IDENTITY_URL_DEST=https://vault.mydomain.com/identity
      # Optional Healthcheck IO Integration
      - HEALTHCHECK_URL=https://healtcheck.url.com/ping
      - HEALTHCHECK_PING=1234343r3fadgsdgs
    volumes:
      - ./config/backups:/app/backups
      - ./config/bitwarden-cli:/app/data/bitwarden-cli
      # Mount your encrypted secret files here when using Option B or C, e.g.:
      # - /path/to/secrets:/secrets:ro
